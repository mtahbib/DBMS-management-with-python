<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <title>Update Vendor Information</title>
</head>
<body class="font-sans bg-gray-100">

    <header class="bg-blue-500 text-white text-center py-4">
        <h1 class="text-2xl font-semibold">Dhaka Bank</h1>
    </header>

    <div class="container mx-auto my-8 p-8 bg-white rounded shadow">
        <h2 class="text-2xl font-semibold mb-4">Update Vendor Information</h2>

        <form action="/update_vendor_info/{{ vendor[0] }}" method="post">
            <label for="name">Name:</label>
            <input type="text" name="name" value="{{ vendor[1] }}" required>
            <label for="email">Email:</label>
            <input type="email" name="email" value="{{ vendor[2] }}" required>
            <label for="contact_service">Contact Service:</label>
            <input type="text" name="contact_service" value="{{ vendor[3] }}" required>
            <button type="submit">Update</button>
        </form>
    </div>

    <footer class="bg-gray-200 text-gray-700 text-center py-4">
        <p class="text-sm">&copy; 2023 Dhaka Bank. All rights reserved Made By Irin Hoque Orchi.</p>
    </footer>

</body>
</html>
